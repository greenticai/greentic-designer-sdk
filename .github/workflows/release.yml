name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch: {}

permissions:
  contents: write
  packages: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-binaries:
    name: Build gtdx binaries (6 platforms)
    uses: greenticai/.github/.github/workflows/release-binaries.yml@main
    with:
      package: greentic-extension-sdk-cli
      binary: gtdx
      windows-archive-format: zip
    secrets: inherit

  publish-crates:
    name: Publish to crates.io
    needs: [release-binaries]
    permissions:
      contents: read
    uses: greenticai/.github/.github/workflows/crates-publish.yml@main
    with:
      crates: "greentic-extension-sdk-contract greentic-extension-sdk-state greentic-extension-sdk-registry greentic-extension-sdk-testing greentic-extension-sdk-cli"
    secrets: inherit
