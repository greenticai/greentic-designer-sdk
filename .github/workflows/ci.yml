name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  check:
    name: fmt + clippy + test + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain (pinned by rust-toolchain.toml)
        run: rustup show

      - uses: Swatinem/rust-cache@v2

      - name: cargo fmt
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy --workspace --all-targets --locked -- -D warnings

      - name: cargo test
        run: cargo test --workspace --locked

      - name: cargo build (release)
        run: cargo build --workspace --locked --release

      - name: cargo publish dry-run (leaf crates)
        run: |
          cargo publish --dry-run --allow-dirty -p greentic-extension-sdk-contract
          cargo publish --dry-run --allow-dirty -p greentic-extension-sdk-state
